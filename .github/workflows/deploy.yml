name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    
    steps:
      - name: Set environment variables
        env:
          PROD_ENV: ${{ secrets.PROD_ENV_FILE }}
          STAGING_ENV: ${{ secrets.STAGING_ENV_FILE }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "TARGET_HOST=${{ secrets.PROD_HOST }}" >> $GITHUB_ENV
            echo "ENV_FILE_SECRET_B64=$(echo "$PROD_ENV" | base64 -w 0)" >> $GITHUB_ENV
            echo "CONTAINER_PORT=80" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            echo "TARGET_HOST=${{ secrets.STAGING_HOST }}" >> $GITHUB_ENV
            echo "ENV_FILE_SECRET_B64=$(echo "$STAGING_ENV" | base64 -w 0)" >> $GITHUB_ENV
            echo "CONTAINER_PORT=8080" >> $GITHUB_ENV
          fi

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.TARGET_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: REGISTRY,IMAGE_NAME,ENV_FILE_SECRET_B64,CONTAINER_PORT
          script: |
            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull the new image
            IMAGE_URL=$(echo "${REGISTRY}/${IMAGE_NAME}:${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]')
            docker pull $IMAGE_URL
            
            # Recreate the .env file securely on the EC2 instance
            echo "$ENV_FILE_SECRET_B64" | base64 -d > .env
            
            # Sync database schema
            docker run --rm --env-file .env -w /app/lib/db $IMAGE_URL npx drizzle-kit push --config ./drizzle.config.ts || true
            
            # Stop and remove the old container if it exists
            docker stop cogs-tracker-app || true
            docker rm cogs-tracker-app || true
            
            # Run the new container
            docker run -d \
              --name cogs-tracker-app \
              --restart unless-stopped \
              -p $CONTAINER_PORT:8080 \
              --env-file .env \
              $IMAGE_URL
            
            # Clean up old images to save space on EC2
            docker image prune -af
